name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ubuntu-latest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install -e .

      - name: Allow udisks2 for CI user
        run: |
          sudo mkdir -p /etc/polkit-1/rules.d
          sudo tee /etc/polkit-1/rules.d/10-udisks-ci.rules << 'POLKIT'
          polkit.addRule(function(action, subject) {
              if (action.id.indexOf("org.freedesktop.udisks2.") == 0) {
                  return polkit.Result.YES;
              }
          });
          POLKIT

      - name: Install coverage
        if: false
        run: python -m pip install coverage

      - name: Set up coverage with relative paths
        if: false
        run: |
          cat > .coveragerc << 'EOF'
          [run]
          relative_files = True
          EOF

      - name: Run failing tests only (diagnostic)
        run: python -m unittest tests.ci_failing_tests -v

      - name: Report coverage
        if: false
        run: python -m coverage report --skip-covered

      - name: Dump XML for Codecov
        if: false
        run: python -m coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        if: false
        uses: codecov/codecov-action@v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  result:
    name: All tests
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          echo "Result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            exit 1
          fi
